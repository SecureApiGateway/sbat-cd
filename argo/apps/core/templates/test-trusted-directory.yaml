apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-trusted-directory-{{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .Values.spec.destination.namespace }}
    server: {{ .Values.spec.destination.server }}
  project: {{ .Values.spec.project }}
  source:
    helm:
      parameters:
        # Config
        - name: config.fqdn
          value: {{ .Values.testTrustedDirectory.config.fqdn }}
        - name: config.ca.keystoreKeyPass
          value: {{ .Values.testTrustedDirectory.config.ca.keystoreKeyPass }}
        - name: config.ca.keystoreStorePass
          value: {{ .Values.testTrustedDirectory.config.ca.keystoreStorePass }}
        - name: config.signing.keystoreKeyPass
          value: {{ .Values.testTrustedDirectory.config.signing.keystoreKeypass }}
        - name: config.signing.keystoreStorePass
          value: {{ .Values.testTrustedDirectory.config.signing.keystoreStorepass }}
        # Deployment
        - name: deployment.image.repo
          value: {{ .Values.testTrustedDirectory.deployment.image.repo }}
        - name: deployment.image.tag
          value: {{ .Values.testTrustedDirectory.deployment.image.tag }}
        # Ingress
        - name: ingress.host
          value: {{ .Values.testTrustedDirectory.ingress.host }}
        - name: ingress.tls.host
          value: {{ .Values.testTrustedDirectory.ingress.tls.host }}
    path: _infra/helm/secure-api-gateway-test-trusted-directory
    repoURL: https://github.com/SecureApiGateway/secure-api-gateway-test-trusted-directory
    targetRevision: {{ .Values.testTrustedDirectory.branch }}
  syncPolicy:
    {{- toYaml .Values.spec.syncPolicy | nindent 4 }}
